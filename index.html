  {icon:"🤐",title:"The Silent Car Ride Rule",color:"#E8382B",summary:"The 20-minute window after a match is the hardest — and most important.",body:"Resist the urge to debrief immediately. Children need time to process emotions. Aim for silence for at least 20 minutes. A simple \"I loved watching you play today\" is enough."},
  {icon:"💬",title:"The One Sentence Rule",color:"#F5820D",summary:"If you must say something after a match, say exactly one thing.",body:"\"I love watching you compete\" tells your child your enjoyment isn't tied to their performance. Avoid \"You should have...\" — even said with love, it creates anxiety."},
  {icon:"🎯",title:"Separate Your Goals from Theirs",color:"#2D9C4A",summary:"A parent's ambitions can easily become a child's burden.",body:"Ask yourself: who wants them to improve more right now — you or them? The fastest path to burnout is a parent more motivated than the child."},

/* ── HELPERS ── */
function todayStr(){return new Date().toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"});}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}}
function loadData(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):null;}catch(e){return null;}}

function ProgressRing({pct,color,size=56}){
  const r=(size-8)/2,circ=2*Math.PI*r,dash=(pct/100)*circ;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={6}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{transition:"stroke-dasharray 0.6s ease"}}/>
    </svg>
  );
}

function Confetti({active,onDone}){
  const ref=useRef();
  useEffect(()=>{
    if(!active)return;
    const c=ref.current;if(!c)return;
    const ctx=c.getContext("2d");c.width=window.innerWidth;c.height=window.innerHeight;
    const cols=["#E8382B","#F5820D","#2D9C4A","#F59E0B","#8B5CF6","#0EA5E9","#EC4899"];
    const p=Array.from({length:100},()=>({x:Math.random()*c.width,y:-10,vx:(Math.random()-.5)*7,vy:Math.random()*5+2,color:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*6+3,rot:Math.random()*360,rv:(Math.random()-.5)*9}));
    let fr=0,raf;
    function draw(){ctx.clearRect(0,0,c.width,c.height);p.forEach(q=>{q.x+=q.vx;q.y+=q.vy;q.vy+=0.09;q.rot+=q.rv;ctx.save();ctx.translate(q.x,q.y);ctx.rotate(q.rot*Math.PI/180);ctx.fillStyle=q.color;ctx.globalAlpha=Math.max(0,1-fr/90);ctx.fillRect(-q.r,-q.r/2,q.r*2,q.r);ctx.restore();});fr++;if(fr<110)raf=requestAnimationFrame(draw);else{ctx.clearRect(0,0,c.width,c.height);onDone&&onDone();}}
    draw();return()=>cancelAnimationFrame(raf);
  },[active]);
  if(!active)return null;
  return <canvas ref={ref} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999}}/>;
}

function Toast({achievement,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3500);return()=>clearTimeout(t);},[]);
  if(!achievement)return null;
  return(
    <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:300,
      background:`linear-gradient(135deg,${achievement.color}f0,${achievement.color}c0)`,
      borderRadius:16,padding:"13px 20px",boxShadow:`0 8px 32px ${achievement.color}55`,
      display:"flex",alignItems:"center",gap:12,minWidth:250,animation:"slideUp 0.4s ease"}}>
      <span style={{fontSize:30}}>{achievement.icon}</span>
      <div>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.8)",textTransform:"uppercase",letterSpacing:1}}>Achievement Unlocked!</div>
        <div style={{fontSize:15,fontWeight:"bold",color:"#fff"}}>{achievement.label}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.85)"}}>{achievement.desc}</div>
      </div>
    </div>
  );
}

function ParentingTip({tip}){
  const[open,setOpen]=useState(false);
  return(
    <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${tip.color}33`,borderLeft:`3px solid ${tip.color}`,borderRadius:12,overflow:"hidden"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",cursor:"pointer"}}>
        <span style={{fontSize:22,flexShrink:0}}>{tip.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:"bold",color:"#e8e0d8"}}>{tip.title}</div>
          <div style={{fontSize:11,color:"#8a9a8a",marginTop:2}}>{tip.summary}</div>
        </div>
        <span style={{color:tip.color,fontSize:16,transition:"transform 0.2s",transform:open?"rotate(180deg)":"rotate(0deg)",flexShrink:0}}>▾</span>
      </div>
      {open&&<div style={{padding:"0 16px 14px 50px",fontSize:13,color:"#b8c8b0",lineHeight:1.75,borderTop:`1px solid ${tip.color}22`}}><div style={{paddingTop:10}}>{tip.body}</div></div>}
    </div>
  );
}

          )}

              <div>
                <div style={{fontSize:12,color:"#8a9a8a",marginBottom:5}}>Date of birth <span style={{color:"#4a5a4a"}}>(optional)</span></div>

    </div>
  );
}

function RulesModule(){
  const[active,setActive]=useState(0);
  const rules=[
    {title:"Scoring a Game",icon:"🔢",color:"#0EA5E9",steps:[{n:"0 pts",called:"Love",emoji:"❤️",why:"No one knows why — 'love' means zero in tennis!"},{n:"1 pt",called:"15",emoji:"1️⃣",why:"Old clocks were used — the hand moved to the 15-minute mark."},{n:"2 pts",called:"30",emoji:"2️⃣",why:"The clock hand moved to 30."},{n:"3 pts",called:"40",emoji:"3️⃣",why:"Originally 45, shortened to 40 to allow for Deuce."},{n:"4 pts",called:"Game!",emoji:"🎉",why:"You win the game — unless it's 40-40 (Deuce)!"}],note:"At Deuce (40-40), you must win 2 in a row. Those points are called Advantage and Game."},
    {title:"Winning a Set",icon:"📊",color:"#2D9C4A",steps:[{n:"6 games",called:"Win the Set",emoji:"✅",why:"Must be ahead by 2 (e.g. 6-4 or 6-3)."},{n:"6-6 tie",called:"Tiebreak!",emoji:"⚡",why:"First to 7 points (by 2) wins the tiebreak 7-6."},{n:"Win 2 sets",called:"Win Match!",emoji:"🏆",why:"Best of 3 sets — first to win 2 wins the match!"}],note:"Junior tennis often uses shorter formats like 7-game sets or match tiebreaks."},
    {title:"Serves & Faults",icon:"🎾",color:"#F5820D",steps:[{n:"1st serve",called:"Full speed!",emoji:"💨",why:"Players usually go big on 1st serve since they have a backup."},{n:"Fault",called:"Try again",emoji:"⚠️",why:"Ball outside box, hits net, or foot-fault."},{n:"2nd serve",called:"Be careful!",emoji:"🧘",why:"Must go in — usually hit more carefully."},{n:"Double fault",called:"Point lost",emoji:"😬",why:"Two faults in a row — opponent wins the point."},{n:"Let",called:"Serve again",emoji:"🔄",why:"Serve clips net but lands in — replay with no fault."}],note:"Red Ball players can use underhand serves — much easier to get the ball in play!"},
    {title:"In & Out Calls",icon:"👁️",color:"#8B5CF6",steps:[{n:"On the line",called:"In!",emoji:"✅",why:"If any part of the ball touches the line, it's in."},{n:"Outside line",called:"Out!",emoji:"❌",why:"The whole ball must be outside the line."},{n:"Not sure?",called:"Good ball!",emoji:"🤝",why:"In junior tennis, if unsure — call it in. Good sportsmanship!"},{n:"Ball hits net",called:"Still in play",emoji:"🕸️",why:"If it goes over after hitting the net, keep playing!"}],note:"Good sportsmanship means giving your opponent the benefit of the doubt on close calls."},
  ];

      </div>
      <div style={{background:"rgba(255,255,255,0.04)",border:`2px solid ${r.color}44`,borderRadius:14,padding:"15px"}}>
        <div style={{fontSize:14,fontWeight:"bold",color:r.color,marginBottom:11}}>{r.icon} {r.title}</div>
        <div style={{display:"grid",gap:6,marginBottom:11}}>
          {r.steps.map((s,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 10px",background:"rgba(255,255,255,0.04)",borderRadius:9}}>
            <span style={{fontSize:17,flexShrink:0}}>{s.emoji}</span>
            <div><div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}><span style={{fontSize:10,color:"#7a8a7a"}}>{s.n}</span><span style={{fontSize:9,color:r.color}}>→</span><span style={{fontSize:12,fontWeight:"bold",color:"#e0e8d8"}}>{s.called}</span></div><div style={{fontSize:10,color:"#8a9a8a",lineHeight:1.45}}>{s.why}</div></div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9}}>
        {[{id:"coach",icon:"📋",label:"Coach Brief",sub:"Share before lessons",color:"#0EA5E9"},{id:"drills",icon:"🎯",label:"Home Drills",sub:"Practice together",color:"#F5820D"},{id:"rescue",icon:"🆘",label:"Practice Rescue",sub:"When it gets hard",color:"#E8382B"}].map(s=>(
          <div key={s.id} onClick={()=>onNavigate(s.id)} style={{background:`${s.color}12`,border:`1px solid ${s.color}33`,borderRadius:13,padding:"12px 8px",textAlign:"center",cursor:"pointer"}}>
            <div style={{fontSize:20,marginBottom:3}}>{s.icon}</div>
            <div style={{fontSize:11,fontWeight:"bold",color:s.color}}>{s.label}</div>
            <div style={{fontSize:9,color:"#5a6a5a",marginTop:1,lineHeight:1.3}}>{s.sub}</div>

      {/* Learn shortcut */}
      <div onClick={()=>onNavigate("learn")} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"13px 15px",cursor:"pointer",display:"flex",alignItems:"center",gap:13}}>

      </div>
    </div>
  );
}

const SKILL_DRILLS={
  r1a:{title:"Self-Feed & Hit Over Net",drills:[{name:"Balloon Toss Hit",steps:["Stand 2–3 feet from the net (or a rope/string)","Toss the ball gently upward with your non-racket hand","Let it bounce once, then swing through to clear the net","Celebrate every ball that goes over — don't count misses yet"],tip:"Feed the ball at waist height. Too high = panic swing. Too low = topped shot."},
    {name:"Drop & Catch Rally",steps:["Parent drops ball from hip height directly in front of child","Child hits and parent catches — no net needed yet","Focus: swing path goes low-to-high, finishing above the shoulder","Do 5 in a row, rest, repeat"],tip:"Your job is to give a consistent drop. Same height, same spot, every time. Inconsistent feeds are the #1 frustration trigger."}]},
  r1b:{title:"Tracking the Ball",drills:[{name:"Catch Before Hit",steps:["Before any hitting session, do 5 minutes of just catching","Parent tosses underhand, child catches with both hands","Call out 'bounce!' the moment the ball hits the ground","This trains eyes to track all the way to contact"],tip:"If she's mishitting, it's almost always an eye-tracking issue, not a swing issue."},
    {name:"Color Call Drill",steps:["Write letters (A, B, C) on old tennis balls with a marker","Toss to child — they must call out the letter before hitting","This forces their eyes to focus on the ball, not the target"],tip:"Don't rush this drill. Slow feeds, clear letters. You can use stickers instead of writing."}]},
  r1c:{title:"Basic Grip",drills:[{name:"The Handshake Check",steps:["Before every session: hold racket out, ask child to 'shake hands with it'","Eastern forehand grip: V of thumb and index knuckle on the side bevel","Check before you start — don't correct mid-rally","10 seconds, every session. Build the habit"],tip:"Never grab their hand to reposition it during a rally. Stop, reset, check grip, then continue."},
    {name:"Wall Tap Warm-Up",steps:["Stand close to a wall or fence","Tap ball gently against it with correct grip, keeping wrist firm","Count consecutive taps — beat yesterday's score","This builds muscle memory for the grip without any pressure"],tip:"Keep it playful. 'How many can you get today?' not 'Do it correctly.'"}]},
  r1d:{title:"2–3 Shot Cooperative Rally",drills:[{name:"Count Together",steps:["Stand close — 6 to 8 feet apart","Both count out loud together: ONE, TWO, THREE...","Stop at 3 to start — success breeds success","Gradually move back as consistency improves"],tip:"Feed softly and directly to her racket. Your goal is to make her look good, not test her."},
    {name:"Target Rally",steps:["Place a cone or water bottle on your side of the net","Try to rally and keep the ball near the target","Count the rally, not the misses","3 in a row = celebrate and reset"],tip:"If she misses, just say 'good try, let's go again.' Zero analysis mid-drill."}]},
  r1e:{title:"Basic Footwork",drills:[{name:"Feet First",steps:["Before each feed, call out 'ready position!' — feet shoulder width, slight bend in knees","Feed the ball slightly to the right or left — not straight at her","Encourage her to take one step toward the ball before swinging","Praise the step, not just the hit"],tip:"Feed wide enough to require movement, but not so wide it's unreachable. You're creating footwork, not a sprint."},
    {name:"Hopscotch Warm-Up",steps:["Set up 4–6 markers (cones, hats, bottles) in a line","Hop through them before picking up the racket","This warms up lateral movement and gets the brain engaged","Then move straight into the rally drill while feet are warm"],tip:"Kids who've warmed up their feet make fewer footwork errors. 3 minutes of movement warm-up changes everything."}]},
  r1f:{title:"Underhand Serve Into Service Box",drills:[{name:"Step & Swing",steps:["Stand at the service line (not the baseline — too far to start)","Hold ball in front hand, racket in back hand","Step forward with front foot as you swing","Goal: ball clears net and lands in the opposite service box"],tip:"Stand closer than feels right. Success at close range builds the motion. Move back gradually."},
    {name:"Target Spots",steps:["Place two cones in the service box as targets","Try to land the serve between them","Keep score: 5 attempts, how many land in?","If she gets 3 or more, move the cones closer together"],tip:"Don't comment on her form during this drill. Just count and celebrate successful serves."}]},
  r1g:{title:"Court Boundaries (In/Out)",drills:[{name:"Line Walk",steps:["Before playing, walk the court boundary lines together","Ask: 'Is this spot in or out?' and point to different places","Walk the baseline, the sidelines, the service line","Make it a game — you get it wrong intentionally and let her correct you"],tip:"Children learn rules much faster when they get to be the expert. Let her teach you."},
    {name:"In/Out Bounce",steps:["Stand at the baseline, bounce balls to different spots","Child calls 'in!' or 'out!' for each bounce","Gradually make it tricky — right on the line = in","Don't overcorrect. If she's unsure, say 'good question — on the line it's always in'"],tip:"Avoid long rule explanations. Quick, repetitive practice locks it in better than lectures."}]},
  r1h:{title:"Enthusiasm & Staying Engaged",drills:[{name:"Choice Architecture",steps:["Give her two drill options before each session","'Do you want to do the counting rally or the target serve first?'","Children disengage when they feel no control — this restores it","End every session on a fun drill she loves, not the one she struggles with"],tip:"The most important skill at this stage is loving tennis. If she's not having fun, the session has failed — not her."},
    {name:"Personal Best Tracking",steps:["Keep a small notepad or use the journal feature","'Last time we got 4 in a row — can we beat it today?'","Kids this age respond to personal bests better than competition","Celebrate the number, not the technique"],tip:"Never compare to other children. Personal bests only."}]},
  r2a:{title:"Rally 5+ Times Consistently",drills:[{name:"The Magic Number",steps:["Pick a number together (start at 3, not 5)","Count out loud on every shot","When you reach the number, both cheer","Build to 5 over multiple sessions — not one session"],tip:"Your feed quality determines rally length more than her skill. Soft, medium-paced, waist-high feeds directly to her forehand side."},
    {name:"Feed Consistency Check",steps:["Before the rally drill, practice your own feed for 2 minutes","Aim for same height, same pace, same spot every time","A child who misses 3 in a row will almost always get frustrated — that's usually a feed problem","If she's struggling, slow down your feed, not her swing"],tip:"The biggest cause of rally breakdown at this stage is parent feed inconsistency. Honest self-check: are your feeds the same every time?"}]},
  r2b:{title:"Ready Position Between Shots",drills:[{name:"Freeze Game",steps:["After every shot, call out 'FREEZE!'","She must freeze in ready position: feet apart, knees bent, racket up","Give her a score out of 5 for her ready position","4+ = excellent, try to beat it next rally"],tip:"Don't freeze her mid-swing. Freeze her in the recovery moment after contact. That's when ready position matters."},
    {name:"Shadow Footwork",steps:["No ball — just movement","You point left or right, she steps into ready position","5 left, 5 right, 5 forward, 5 back","Then pick up rackets and apply it to rally"],tip:"10 minutes of shadow footwork per week will do more for her ready position than 1 hour of correcting mid-rally."}]},
  r2c:{title:"Forehand Swing Path & Follow-Through",drills:[{name:"The Fence Check",steps:["Stand her near a fence or wall (not touching)","Ask her to swing — if racket hits fence, she's wrapping around","Good follow-through ends over the shoulder, not around the body","No ball needed — just swing and check finish position"],tip:"'Finish over your shoulder' is the cue. Use it consistently. Don't use different words each time."},
    {name:"Slow Motion Swings",steps:["Ask her to swing in slow motion — 5 seconds for the full swing","Watch: does the racket go low-to-high? Does it finish above the shoulder?","Speed comes later. Form first.","Then feed a ball and ask her to replicate the same feeling"],tip:"Slow motion reveals what fast swings hide. Do this at the start of each session."}]},
  r2d:{title:"Backhand with Some Control",drills:[{name:"Two-Hand Wall Rally",steps:["Stand 3–4 feet from a wall or fence","Tap the ball against it on the backhand side, two hands on racket","Count consecutive taps — 5 is a great start","This builds muscle memory without the pressure of a rally"],tip:"Two-handed backhand is strongly recommended at this age. Don't push one-hander yet."},
    {name:"Gentle Feed Backhand",steps:["Feed softly and directly to her backhand side (for a right-hander: your right, her left)","Start from 6 feet away — very close","She hits, you catch. No rally yet.","Focus: both hands on racket, swing through, finish high"],tip:"Feed directly to where the racket needs to be — don't make her move to the ball for this drill. Movement comes later."}]},
  r2e:{title:"Direct Ball Cross-Court or Down the Line",drills:[{name:"Two-Target Game",steps:["Place one cone cross-court, one down the line","Call out which target before you feed: 'Cross!' or 'Line!'","She aims for the called target","Score: 5 tries for each direction"],tip:"Give the direction call early — before you feed, not as you feed. Children need time to process the target."},
    {name:"Traffic Light",steps:["Red = stop, check grip and stance","Yellow = slow-motion swing toward target","Green = full speed swing","Do one red, one yellow, one green for each direction"],tip:"This drill teaches intentional direction — not just 'hit it somewhere'."}]},
  r2f:{title:"Underhand Serve — Consistency & Placement",drills:[{name:"10-Serve Challenge",steps:["10 serves in a row from the service line","Count how many land in the box","Track the number each session — personal best system","When she hits 8/10 consistently, move one step back"],tip:"Placement before power. The goal is landing in the box, not serving hard."},
    {name:"Corner to Corner",steps:["Place one cone in the far left of the service box, one in the far right","Serve 5 to each corner","Total: 10 serves, track how many land near a cone","This builds awareness that the serve can be directional"],tip:"Don't correct mechanics during this drill. Just count and celebrate direction."}]},
  r2g:{title:"Play a Full 7-Game Set Format",drills:[{name:"Mini Match Practice",steps:["Set up a full 7-game set at home (or adjust to 4-game if attention is short)","You call score out loud before every point: '15-love', '30-15' etc.","Let her win some games — this isn't a competitive match, it's scoring literacy","After the set, ask her to tell you the final score"],tip:"If she gets frustrated with losing, switch to 'first to 4 games' as a stepping stone."},
    {name:"Score Keeper Role",steps:["Give her the scorekeeping job for a practice set you play with someone else","She calls the score before each point","If she gets it wrong, gently correct — 'good try, it's actually 30-15'","This builds scoring confidence without performance pressure"],tip:"Children who track score for others learn it faster than those who only play."}]},
  r2h:{title:"Sportsmanship & Court Etiquette",drills:[{name:"Role Play Scenarios",steps:["At home (not on court), act out situations: close calls, losing a point, missing an easy shot","Ask 'what would a good sport do here?'","Practice the physical response: take a breath, reset, play on","Praise the reset — not just the good behavior"],tip:"Don't address sportsmanship moments on court in front of others. Brief, private, immediate — then move on."},
    {name:"The Handshake Habit",steps:["End every practice session — even at home — with a handshake and 'good game'","Make it a ritual, not a lesson","Before real matches: 'What do we always do at the end?' — she should know"],tip:"Rituals create muscle memory for behavior. The handshake should be automatic by the time she plays her first match."}]},
  o1:{title:"Consistent Forehand with Follow-Through",drills:[{name:"20-Ball Forehand Feed",steps:["Feed 20 balls in a row to the forehand side","She hits, you catch or collect","After 20: count how many had a full follow-through (racket finishes above shoulder)","Target: 15 out of 20"],tip:"Feed at the same pace, same height, same location every time. Consistency in your feed creates consistency in her swing."},
    {name:"Follow-Through Freeze",steps:["After every forehand, she freezes in finish position for 2 seconds","You call out: 'Good finish!' or 'A bit low — try again'","This builds body awareness of what the correct finish feels like"],tip:"Use the same phrase every time: 'Finish above the ear.' Consistency of cue = faster learning."}]},
  o2:{title:"Developing Backhand (1 or 2-Handed)",drills:[{name:"Backhand Only Rally",steps:["Set a rule: only backhands allowed in this drill","Feed only to the backhand side","Count how many she gets over the net in a row","Target: 5 consecutive"],tip:"Two-hander or one-hander — commit to one for now. Switching between them mid-development delays both."},
    {name:"Shadow + Feed",steps:["Shadow swing 3 times — she shows you the correct shape","Then you feed a ball and she replicates the shadow swing","Repeat: shadow, shadow, shadow, ball","This bridges the gap between knowing the motion and applying it"],tip:"If the shadow looks right but the ball swing looks wrong, her weight transfer is usually the issue — not the arm."}]},
  o3:{title:"Serve Overhand with Toss and Motion",drills:[{name:"Toss Only",steps:["No racket — just work on the toss","Toss the ball straight up, slightly in front, at the same height every time","Target: ball should land on the same spot every time (mark it with chalk or a cone)","20 tosses per session until it's automatic"],tip:"90% of serving problems in junior tennis come from an inconsistent toss. Toss first, swing second."},
    {name:"Trophy Position",steps:["Racket up, arm extended, ball at the top of the toss — freeze here","This is the 'trophy position' — hold it for 2 seconds","Then swing through from trophy to contact","Practice: toss, reach trophy, hold, then swing"],tip:"Use the word 'trophy' consistently. 'Show me your trophy!' is a faster cue than 'extend your arm and hold the racket up'."}]},
  o4:{title:"5+ Shot Rally from Baseline",drills:[{name:"Feed-Rally Combo",steps:["Start with a controlled feed, then rally out the point","Count every shot — both parent and child's shots count","Target: 5 or more before the ball goes out or in the net","Record the best rally length each session"],tip:"Move back to the baseline yourself when feeding. Your position matters — if you're at the net feeding, she doesn't learn to rally from the baseline."},
    {name:"Beat Your Best",steps:["Each session, the goal is to beat the previous session's longest rally","Keep the number written down (use the journal feature)","When she beats it, genuine celebration","If she doesn't beat it, 'we'll get it next time' and move on"],tip:"Personal best culture eliminates comparison pressure and creates intrinsic motivation."}]},
  o5:{title:"Approach the Net with Confidence",drills:[{name:"Short Ball Attack",steps:["Feed a short ball (bounces near the service line)","She must recognize it as a short ball and move forward","Hit the approach shot, then come to the net","You lob back — she tries one volley"],tip:"Call out 'short ball!' as you feed it, at first. This trains pattern recognition. Fade the verbal cue over time."},
    {name:"Net Sprint",steps:["Start at baseline in ready position","On your signal, she sprints to the service line and stops in ready position","Feed a ball — she hits a volley","The movement habit is more important than the volley quality at first"],tip:"Speed to the net is a confidence issue as much as a technique issue. Celebrate fast approaches."}]},
  o6:{title:"Volley 2+ Times at Net",drills:[{name:"Catch and Punch",steps:["Stand 6 feet apart at the net","Toss underhand to her — she 'punches' it back (no swing, just push)","Count consecutive volleys","Target: 2 first, build to 5"],tip:"'No swing, just punch' is the key cue. Most junior volley errors come from big swings. Compact = clean."},
    {name:"Mini Tennis",steps:["Both stand in the service boxes","Rally using volleys only — ball must stay between the two service lines","This creates pressure to control the volley, not just hit it hard","First to 10 points"],tip:"Mini tennis is one of the best all-around development drills at this stage. Use it as a warm-up every session."}]},
  o7:{title:"Play with Strategic Intent",drills:[{name:"Target Ball",steps:["Place a cone in each corner of the court","Before each point, she picks which cone she's aiming for","After the point, ask 'did you hit your target?'","This develops conscious shot selection"],tip:"Don't evaluate whether the strategy was right or wrong. Just reinforce the habit of choosing a target."},
    {name:"Pattern Play",steps:["Teach one simple pattern: cross-court forehand, then down the line","Feed to her forehand: she hits cross-court","Move to receive cross-court: she hits down the line","Repeat 10 times"],tip:"Patterns beat improvisation at this age. One pattern learned well is worth more than five patterns learned partially."}]},
  g1:{title:"Reliable Forehand with Topspin",drills:[{name:"Brush Drill",steps:["Low-to-high swing path is the key to topspin","Ask her to imagine 'brushing the back of the ball upward'","Feed at medium pace — she focuses on swing path, not placement","Watch: does the ball land with a higher bounce? That's topspin working"],tip:"Topspin comes from the swing path, not wrist flick. If she's flicking her wrist, slow the swing down."},
    {name:"Spin Comparison",steps:["Hit 5 balls flat, 5 balls with topspin","Count how many land in from each set","Topspin balls should land in more consistently because of the higher net clearance and extra dip","This teaches the practical value of topspin"],tip:"Don't over-explain the physics. Just show the result — more balls in."}]},
  g2:{title:"Consistent Two-Handed or Slice Backhand",drills:[{name:"Backhand 20",steps:["20 backhand feeds, she hits, you collect","Count: in/out/net — track ratio","Target: 15/20 landing in","Do this at the start of every session to establish baseline"],tip:"Consistency before direction. Don't add targets until she's reliably clearing the net."},
    {name:"Slice Shape",steps:["For slice: feed shoulder-high ball","She swings high-to-low with a continental grip","The ball should float and stay low after the bounce","Do 10 in a row, just working on the shape"],tip:"Slice is a weapon, not a weakness. Frame it as 'now you have two backhands'."}]},
  g3:{title:"Serve with Full Toss, Pronation, and Motion",drills:[{name:"Pronation Shadow",steps:["Hold racket up at the trophy position","From trophy, swing through and pronate the wrist (turn it outward)","The racket face should end facing left (for right-handers) after contact","Do this in slow motion — 10 times — before serving"],tip:"Pronation is the last thing to develop. Don't force it. Build the motion, pronation comes with maturity and practice."},
    {name:"Serve Targets",steps:["Place a cone in the T (center of the service box) and one wide","Serve 10 to the T, 10 wide, 10 at the body","Track results — which target is most consistent?","This builds tactical serving awareness"],tip:"Placement over power. A well-placed second serve is more valuable than a hard one in the net."}]},
  g4:{title:"Understand and Apply Spin",drills:[{name:"Spin Museum",steps:["Hit three types of shots back to back: flat, topspin, slice","Point to which is which after each","Ask her to identify the spin from the bounce and flight","This builds 'spin literacy'"],tip:"Children who can read spin become much better competitors. This is a long-term investment."},
    {name:"Spin Request Rally",steps:["Before each shot, you call out: 'topspin' or 'slice'","She must apply the requested spin","Start slow — medium pace, close to the baseline","Build speed once the shape is consistent"],tip:"Don't grade quality in this drill. Just reinforce the habit of intentional spin selection."}]},
  g5:{title:"Move Efficiently Around Full Court",drills:[{name:"Corner to Corner",steps:["She starts at the center baseline mark","You feed alternating wide balls — left corner, right corner","She must recover to center between each ball","Count: how many in a row can she handle?"],tip:"Recovery to center is the habit. If she doesn't recover, pause the drill and restart. That habit is more important than hitting the wide ball."},
    {name:"Pattern Movement",steps:["Feed a pattern: wide right, short center, wide left","She moves to each ball in sequence","After 3 balls, stop — she names where she is on the court","This builds spatial awareness and tactical positioning"],tip:"Narrating their position ('I'm at the right corner') builds court awareness faster than instruction alone."}]},
  g6:{title:"Volley with Control and Direction",drills:[{name:"Directional Volley",steps:["Feed to her forehand volley side","She must alternate: one cross-court, one down the line","You catch each — no rally yet","Count: how many consecutive directed volleys?"],tip:"Compact punch motion for direction. Big swings = direction loss."},
    {name:"Volley-Volley-Lob",steps:["Both at the net — exchange two volleys, then she lobs on the third","This simulates a real net exchange pattern","Count successful three-ball sequences","5 in a row = excellent"],tip:"The pattern creates game-realistic pressure. Volleys in drills often look different to volleys in points because of the added pressure of 'what's next'."}]},
  g7:{title:"Match-Play Strategy and Shot Selection",drills:[{name:"Consequence Points",steps:["Play points where you must announce your strategy before the point starts","'I'm going to push her wide and approach'","After the point, review: did the strategy work? Why or why not?","This builds tactical thinking"],tip:"Don't correct strategy in the moment. Let the point play out. Debrief after."},
    {name:"High Percentage Counting",steps:["Play a set — but count unforced errors separately from winners","Goal: reduce unforced errors each set","A player who doesn't make errors doesn't lose","This teaches that consistency IS strategy"],tip:"At junior level, consistent players beat aggressive players most of the time. Building this mindset early pays dividends."}]},
};

/* ── HOME DRILLS TAB ── */
function HomeDrills({player,getStageProgress}){
  const[selectedSkill,setSelectedSkill]=useState(null);
  const[selectedStage,setSelectedStage]=useState(null);

  // Find all incomplete skills across all stages
  const incompleteByStage=STAGES.map(s=>{
    const incomplete=s.skills.filter(sk=>!player.checked[sk.id]);
    return{stage:s,skills:incomplete};
  }).filter(x=>x.skills.length>0);

  const allIncomplete=incompleteByStage.flatMap(x=>x.skills.map(sk=>({skill:sk,stage:x.stage})));
  const currentStage=STAGES.find(s=>s.id===player.profile?.currentStage)||STAGES[0];
  const focusSkills=currentStage.skills.filter(sk=>!player.checked[sk.id]);

  const drill=selectedSkill?SKILL_DRILLS[selectedSkill.id]:null;
  const skillStage=selectedSkill?STAGES.find(s=>s.skills.find(sk=>sk.id===selectedSkill.id)):null;

  if(selectedSkill&&drill){
    return(
      <div style={{animation:"fadeIn 0.3s ease"}}>
        <button onClick={()=>setSelectedSkill(null)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 13px",borderRadius:18,background:"rgba(255,255,255,0.07)",color:"#aaa",border:"none",cursor:"pointer",fontSize:12,marginBottom:14}}>← Back to drills</button>
        <div style={{background:`${skillStage.color}18`,border:`1px solid ${skillStage.color}44`,borderRadius:16,padding:"16px 15px",marginBottom:13}}>
          <div style={{fontSize:10,color:skillStage.color,textTransform:"uppercase",letterSpacing:1,fontWeight:600,marginBottom:5}}>{skillStage.emoji} {skillStage.label}</div>
          <div style={{fontSize:17,fontWeight:"bold",marginBottom:3}}>{drill.title}</div>
          <div style={{fontSize:11,color:"#8a9a8a"}}>2 parent-led drills · No coach needed</div>
        </div>
        {drill.drills.map((d,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"16px 15px",marginBottom:11}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:12}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:`${skillStage.color}22`,border:`2px solid ${skillStage.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:"bold",color:skillStage.color,flexShrink:0}}>{i+1}</div>
              <div style={{fontSize:15,fontWeight:"bold"}}>{d.name}</div>
            </div>
            <div style={{display:"grid",gap:6,marginBottom:11}}>
              {d.steps.map((step,j)=>(
                <div key={j} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 10px",background:"rgba(255,255,255,0.04)",borderRadius:8}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:skillStage.color,color:"#fff",fontSize:9,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{j+1}</div>
                  <span style={{fontSize:12,color:"#d0d8c8",lineHeight:1.55}}>{step}</span>
                </div>
              ))}
            </div>
            <div style={{background:`${skillStage.color}14`,border:`1px solid ${skillStage.color}33`,borderLeft:`3px solid ${skillStage.color}`,borderRadius:9,padding:"9px 12px",display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{fontSize:14,flexShrink:0}}>💡</span>
              <span style={{fontSize:11,color:"#b0c8a0",lineHeight:1.6,fontStyle:"italic"}}>{d.tip}</span>
            </div>
          </div>
        ))}
      </div>
    );
  }

  return(
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"13px 15px",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:"bold",marginBottom:4}}>🎯 Home Drill Library</div>
        <div style={{fontSize:11,color:"#8a9a8a",lineHeight:1.6}}>Step-by-step drills for every unchecked skill. Each drill is designed for a parent with no coaching background — just a racket, some balls, and 20 minutes.</div>
      </div>

      {/* Current stage focus — top of the list */}
      {focusSkills.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:currentStage.color,textTransform:"uppercase",letterSpacing:1,fontWeight:600,marginBottom:8}}>⚡ Current Stage Focus — {currentStage.label}</div>
          <div style={{display:"grid",gap:7}}>
            {focusSkills.map(sk=>(
              <div key={sk.id} onClick={()=>setSelectedSkill(sk)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,cursor:"pointer",background:`${currentStage.color}12`,border:`1px solid ${currentStage.color}44`,transition:"all 0.2s"}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:`${currentStage.color}22`,border:`2px solid ${currentStage.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🎯</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:"#e0e8d8",marginBottom:2}}>{sk.text}</div>
                  <div style={{fontSize:10,color:currentStage.color}}>{SKILL_DRILLS[sk.id]?`2 drills available`:"General practice tips"}</div>
                </div>
                <span style={{color:currentStage.color,fontSize:16}}>→</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* All other stages */}
      {incompleteByStage.filter(x=>x.stage.id!==currentStage.id).map(({stage:s,skills})=>(
        <div key={s.id} style={{marginBottom:14}}>
          <div style={{fontSize:11,color:"#6a7a6a",textTransform:"uppercase",letterSpacing:1,fontWeight:600,marginBottom:7}}>{s.emoji} {s.label}</div>
          <div style={{display:"grid",gap:6}}>
            {skills.map(sk=>(
              <div key={sk.id} onClick={()=>setSelectedSkill(sk)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 13px",borderRadius:11,cursor:"pointer",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",transition:"all 0.2s"}}>
                <span style={{fontSize:14,flexShrink:0}}>○</span>
                <span style={{flex:1,fontSize:12,color:"#b0b8a8"}}>{sk.text}</span>
                <span style={{color:"#4a6a5a",fontSize:14}}>→</span>
              </div>
            ))}
          </div>
        </div>
      ))}

      {allIncomplete.length===0&&(
        <div style={{textAlign:"center",padding:"32px 20px",color:"#5a7a5a"}}>
          <div style={{fontSize:36,marginBottom:10}}>🏆</div>
          <div style={{fontSize:15,fontWeight:"bold",marginBottom:5}}>All skills mastered!</div>
          <div style={{fontSize:12}}>Nothing left to drill — your player is ready for the next level.</div>
        </div>
      )}
    </div>
  );
}

/* ── COACH BRIEFING TAB ── */
function CoachBriefing({player,getStageProgress,getCurrentBall}){
  const[copied,setCopied]=useState(false);
  const currentBall=getCurrentBall();
  const name=player.profile?.name||"Player";
  const coachName=player.profile?.coachName||"Coach";
  const club=player.profile?.club||"";

  // Build objective data
  const allStages=STAGES.map(s=>{
    const{pct,done,total}=getStageProgress(s.id);
    const mastered=s.skills.filter(sk=>player.checked[sk.id]);
    const notYet=s.skills.filter(sk=>!player.checked[sk.id]);
    return{stage:s,pct,done,total,mastered,notYet};
  });

  const currentStageData=allStages.find(x=>x.stage.id===currentBall.id);
  const recentJournal=(player.journal||[]).slice(0,5);
  const sessionCount=(player.journal||[]).length;
  const lastSession=recentJournal[0]?.date||"No sessions logged";

  // Skills mastered with dates — only current stage
  const masteredWithDates=currentStageData?.mastered.map(sk=>({
    text:sk.text,date:player.masteredDates?.[sk.id]||"date unknown"
  }))||[];

  function buildBriefText(){
    const lines=[];
    lines.push(`PLAYER BRIEF — ${name}`);
    lines.push(`Generated: ${todayStr()}`);
    if(club)lines.push(`Program: ${club}`);
    lines.push("");
    lines.push(`CURRENT LEVEL: ${currentBall.label} (${currentBall.courtSize})`);
    lines.push(`Overall progression: ${STAGES.flatMap(s=>s.skills).filter(sk=>player.checked[sk.id]).length} of ${STAGES.flatMap(s=>s.skills).length} total skills verified`);
    lines.push(`Sessions logged: ${sessionCount} | Last session: ${lastSession}`);
    lines.push("");
    lines.push(`${currentBall.label.toUpperCase()} — CURRENT STAGE`);
    lines.push(`Progress: ${currentStageData?.done||0} of ${currentStageData?.total||0} skills (${currentStageData?.pct||0}%)`);
    lines.push("");
    if(masteredWithDates.length>0){
      lines.push("SKILLS CONFIRMED:");
      masteredWithDates.forEach(s=>lines.push(`  ✓ ${s.text} (${s.date})`));
      lines.push("");
    }
    if(currentStageData?.notYet.length>0){
      lines.push("SKILLS NOT YET CONFIRMED:");
      currentStageData.notYet.forEach(s=>lines.push(`  ○ ${s.text}`));
      lines.push("");
    }
    if(recentJournal.length>0){
      lines.push("RECENT PRACTICE LOG:");
      recentJournal.forEach(e=>lines.push(`  [${e.date}] ${e.text}`));
      lines.push("");
    }
    lines.push("— Generated by Junior Tennis Tracker");
    return lines.join("\n");
  }

  function copyText(){
    navigator.clipboard.writeText(buildBriefText()).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
  }

  function printBrief(){
    const txt=buildBriefText();
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><title>Player Brief — ${name}</title><style>body{font-family:Georgia,serif;padding:40px;max-width:680px;margin:0 auto;color:#1a1a1a;line-height:1.7;}pre{white-space:pre-wrap;font-family:Georgia,serif;font-size:14px;}</style></head><body><pre>${txt}</pre></body></html>`);
    w.document.close();setTimeout(()=>w.print(),300);
  }

  return(
    <div style={{animation:"fadeIn 0.3s ease"}}>
      {/* Header */}
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"14px 15px",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:"bold",marginBottom:4}}>📋 Coach Briefing Report</div>
        <div style={{fontSize:11,color:"#8a9a8a",lineHeight:1.65}}>An objective, data-only summary of {name}'s current progress — designed to give {coachName} a complete picture in 30 seconds. No parent opinions. No requests. Just verified facts.</div>
      </div>

      {/* The brief card */}
      <div style={{background:"#0a1a10",border:"1px solid #2D9C4A44",borderRadius:14,padding:"18px 16px",marginBottom:13,fontFamily:"Georgia,serif"}}>
        {/* Header */}
        <div style={{borderBottom:"1px solid rgba(255,255,255,0.1)",paddingBottom:12,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <span style={{fontSize:26}}>{player.profile?.avatar||"🎾"}</span>
            <div>
              <div style={{fontSize:18,fontWeight:"bold"}}>{name}</div>
              {coachName!=="Coach"&&<div style={{fontSize:11,color:"#6a9a7a"}}>For: {coachName}{club&&club!=="Other / Independent"?` · ${club}`:""}</div>}
            </div>
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div style={{fontSize:10,color:"#5a7a5a"}}>Generated</div>
              <div style={{fontSize:11,color:"#8a9a8a"}}>{todayStr()}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",marginTop:8}}>
            <span style={{background:`${currentBall.color}22`,color:currentBall.color,padding:"3px 10px",borderRadius:10,fontSize:11,fontWeight:600}}>{currentBall.emoji} {currentBall.label}</span>
            <span style={{background:"rgba(255,255,255,0.07)",color:"#c0c8c0",padding:"3px 10px",borderRadius:10,fontSize:11}}>{currentBall.courtSize}</span>
            <span style={{background:"rgba(255,255,255,0.07)",color:"#c0c8c0",padding:"3px 10px",borderRadius:10,fontSize:11}}>{sessionCount} sessions logged</span>
            {lastSession!=="No sessions logged"&&<span style={{background:"rgba(255,255,255,0.07)",color:"#c0c8c0",padding:"3px 10px",borderRadius:10,fontSize:11}}>Last: {lastSession}</span>}
          </div>
        </div>

        {/* Current stage detail */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:currentBall.color,textTransform:"uppercase",letterSpacing:1,fontWeight:600,marginBottom:10}}>Current Stage — {currentBall.label}</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{flex:1,height:6,background:"rgba(255,255,255,0.08)",borderRadius:3}}><div style={{height:"100%",width:`${currentStageData?.pct||0}%`,background:currentBall.color,borderRadius:3}}/></div>
            <span style={{fontSize:11,color:currentBall.color,fontWeight:600,flexShrink:0}}>{currentStageData?.done||0}/{currentStageData?.total||0}</span>
          </div>

          {masteredWithDates.length>0&&(
            <div style={{marginBottom:11}}>
              <div style={{fontSize:10,color:"#5a8a5a",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>✓ Confirmed Skills</div>
              {masteredWithDates.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                  <span style={{color:"#2D9C4A",fontSize:11,flexShrink:0}}>✓</span>
                  <span style={{flex:1,fontSize:11,color:"#b0c8b0"}}>{s.text}</span>
                  <span style={{fontSize:9,color:"#2D9C4A",fontStyle:"italic",flexShrink:0}}>{s.date}</span>
                </div>
              ))}
            </div>
          )}

          {currentStageData?.notYet.length>0&&(
            <div style={{marginBottom:11}}>
              <div style={{fontSize:10,color:"#aa7a3a",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>○ Not Yet Confirmed</div>
              {currentStageData.notYet.map((sk,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                  <span style={{color:"#aa7a3a",fontSize:11,flexShrink:0}}>○</span>
                  <span style={{flex:1,fontSize:11,color:"#a0a898"}}>{sk.text}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Previous stages summary */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:"#5a6a5a",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>All Stages — Snapshot</div>
          {allStages.map(({stage:s,pct,done,total})=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
              <span style={{fontSize:13,flexShrink:0}}>{s.emoji}</span>
              <span style={{fontSize:11,color:"#8a9a8a",width:70,flexShrink:0}}>{s.short}</span>
              <div style={{flex:1,height:4,background:"rgba(255,255,255,0.07)",borderRadius:2}}><div style={{height:"100%",width:`${pct}%`,background:s.color,borderRadius:2}}/></div>
              <span style={{fontSize:10,color:pct===100?"#2D9C4A":"#6a7a6a",flexShrink:0}}>{done}/{total}</span>
            </div>
          ))}
        </div>

        {/* Recent practice log */}
        {recentJournal.length>0&&(
          <div>
            <div style={{fontSize:10,color:"#5a6a5a",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Recent Practice Log</div>
            {recentJournal.map((e,i)=>{
              const es=STAGES.find(s=>s.id===e.stage)||STAGES[0];
              return(
                <div key={i} style={{padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                  <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:9,color:"#5a6a5a"}}>{e.date}</span>
                    <span style={{fontSize:8,color:es.color,background:`${es.color}22`,padding:"1px 5px",borderRadius:6}}>{es.short}</span>
                  </div>
                  <div style={{fontSize:11,color:"#9aaa92",lineHeight:1.5}}>{e.text}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Action buttons */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={copyText} style={{flex:1,padding:"11px",borderRadius:12,background:copied?"#2D9C4A":"rgba(255,255,255,0.08)",color:copied?"#fff":"#ccc",border:`1px solid ${copied?"#2D9C4A":"rgba(255,255,255,0.12)"}`,cursor:"pointer",fontSize:12,fontWeight:600,transition:"all 0.2s"}}>
          {copied?"✓ Copied!":"📋 Copy as Text"}
        </button>
        <button onClick={printBrief} style={{flex:1,padding:"11px",borderRadius:12,background:"#2D9C4A",color:"#fff",border:"none",cursor:"pointer",fontSize:12,fontWeight:600}}>
          🖨️ Print / PDF
        </button>
      </div>
      <div style={{fontSize:10,color:"#4a5a4a",textAlign:"center",marginTop:10}}>Share before a lesson · No parent opinions included · Coach draws their own conclusions</div>
    </div>
  );
}

  const SITUATIONS=[
    {id:"miss3",emoji:"😤",label:"3 Misses in a Row",color:"#E8382B",
     summary:"The most common frustration trigger. Act before the 4th miss.",
     immediate:"Say absolutely nothing about the miss. Feed the next ball slightly easier than usual — directly to her forehand, slower pace, more height. Make the next ball as easy to hit as possible. Let success reset the emotional state.",
     avoid:"Avoid: 'It's okay', 'Keep trying', 'You almost had it'. All of these draw attention to the failure streak.",
     cue:"Your cue: Stay relaxed in your own body language. Children read parent tension instantly. A calm face and a gentle next feed communicates more than any words.",
     tip:"If she misses 5+ in a row on the same drill, the drill is too hard right now. Switch to something she's good at for 5 minutes. Come back to the hard drill after a win."},
    {id:"feeds",emoji:"😠",label:"Frustrated with Your Feeds",color:"#C0271C",
     summary:"She's telling you something real. The feed is probably inconsistent.",
     immediate:"Stop. Take a genuine pause. Say: 'You're right, let me get a better feed for you.' Then consciously slow down and simplify your feed — same height, same pace, same spot.",
     avoid:"Avoid defending your feed quality. Even if you think it was fine, her frustration is data. The more confident you feel about your feed, the more likely it's the problem.",
     cue:"Self-check before every 5-ball set: Am I feeding to the same spot? Same height? Same pace? One variable change is all it takes to break her rhythm.",

     avoid:"Don't say 'just 5 more.' 'Just 5 more' is a trust-eroder — children learn it means 15 more. Make your commitments specific and honor them.",
     cue:"If she wants to quit early in a session, it's often about the drill. If she wants to quit late in a session, it's often about fatigue. These need different responses.",

     avoid:"Avoid: 'WOW! Amazing! Did you see that?!' The bigger the reaction, the longer the focus loss. Save big reactions for the end of the session.",
     cue:"Teach the reset ritual: after a great shot, she bounces on her toes twice, gets into ready position. This physical ritual interrupts the emotional spike and refocuses her.",
     tip:"Children who learn to manage positive emotions perform better in matches than children who only manage frustration. Celebrate — then reset. Both matter."},
    {id:"compare",emoji:"👀",label:"Comparing Herself to Others",color:"#8B5CF6",

     avoid:"Avoid: 'You're just as good as Sofia', 'You'll be better than her soon.' Comparison responses feed the comparison mindset. Redirect to personal standards.",
     cue:"Children who compare outward haven't yet developed an internal benchmark. Your job is to consistently offer a personal-best framework until it becomes her default.",
     tip:"'Is that your best?' is a more powerful question than any reassurance about how she compares to others. Get her looking inward."},

     cue:"After the 2-minute pause: 'Ready to go again?' No recap of what happened. Fresh start. The pause was the consequence — don't add a sermon.",
