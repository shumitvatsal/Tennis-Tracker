              {n:1,mistake:"Feeding too hard",fix:"Slow it down by 40%. You'll be surprised how much better she hits."},
              {n:2,mistake:"Feeding too high",fix:"Waist height is ideal. Chest-high feeds cause reaching and mis-timing."},
              {n:3,mistake:"Feeding to the same spot every time (no movement)",fix:"Add 1–2 feet of variation to build footwork. Not too much — just enough."},
              {n:4,mistake:"Feeding while talking",fix:"Feed, then talk. Talking mid-feed causes the child to look at your face, not the ball."},
              {n:5,mistake:"Inconsistent rhythm",fix:"Establish a rhythm: feed, wait for the hit, catch or collect, feed again. Same tempo every time."},
            ].map(m=>(
              <div key={m.n} style={{display:"flex",gap:11,padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#E8382B22",border:"1px solid #E8382B55",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#E8382B",fontWeight:"bold",flexShrink:0}}>{m.n}</div>
                <div><div style={{fontSize:12,fontWeight:"bold",color:"#e0e8d8",marginBottom:2}}>{m.mistake}</div><div style={{fontSize:11,color:"#8a9a8a",lineHeight:1.5}}>{m.fix}</div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* RESET PROTOCOL */}
      {activeSection==="reset"&&(
        <div>
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:"bold",marginBottom:4}}>🔄 The 5-Step Session Reset</div>
            <div style={{fontSize:11,color:"#8a9a8a",lineHeight:1.65}}>When a practice session is genuinely going off the rails — frustration escalating, energy collapsing — use this protocol. It works because it changes the physical state first, emotional state second.</div>
          </div>
          <div style={{display:"grid",gap:9,marginBottom:14}}>
            {RESET_PROTOCOL.map((step,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${step.color}33`,borderRadius:13,padding:"14px 14px",display:"flex",gap:13,alignItems:"flex-start"}}>
                <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:`${step.color}22`,border:`2px solid ${step.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{step.icon}</div>
                  <div style={{fontSize:9,color:step.color,fontWeight:700}}>STEP {step.step}</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:"bold",marginBottom:5,color:"#e0e8d8"}}>{step.label}</div>
                  <div style={{fontSize:12,color:"#c8d0c0",lineHeight:1.65,marginBottom:8}}>{step.instruction}</div>
                  <div style={{background:`${step.color}14`,border:`1px solid ${step.color}33`,borderRadius:8,padding:"7px 10px",fontSize:11,color:step.color,fontStyle:"italic"}}>👤 {step.parent}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"13px 14px"}}>
            <div style={{fontSize:12,fontWeight:"bold",marginBottom:7}}>🧠 The Science Behind This</div>
            <div style={{fontSize:11,color:"#8a9a8a",lineHeight:1.7}}>Frustration activates the amygdala — the brain's alarm system. Logical instruction doesn't work well when the amygdala is active. This protocol works by using physical movement and time to let the nervous system return to baseline. Once calm, learning resumes. Trying to coach through the frustration almost always makes it worse and longer.</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── MAIN APP ── */
function App(){
  const[appState,setAppState]=useState("loading");
  const[players,setPlayers]=useState([]);
  const[activePlayer,setActivePlayer]=useState(0);
  const[activeTab,setActiveTab]=useState("home");
  const[activeStage,setActiveStage]=useState("red1");
  const[activeLearnModule,setActiveLearnModule]=useState("grips");
  const[journalInput,setJournalInput]=useState("");
  const[journalMood,setJournalMood]=useState("🌟");
  const[showProfileEdit,setShowProfileEdit]=useState(false);
  const[confettiActive,setConfettiActive]=useState(false);
  const[toastAchievement,setToastAchievement]=useState(null);
  const[recentStarSkill,setRecentStarSkill]=useState(null);
  const[migrationState,setMigrationState]=useState(null); // null | "available" | "done" | "none"
  const[migrationPreview,setMigrationPreview]=useState(null);

  useEffect(()=>{
    const saved=loadData();
    if(saved&&Array.isArray(saved.players)&&saved.players.length>0){
      setPlayers(saved.players);setActivePlayer(saved.activePlayer||0);setAppState("app");
      // Check if old v5 data exists too
      try{
        const old=JSON.parse(localStorage.getItem("jtt-v5")||"null");
        if(old&&Array.isArray(old.players)&&old.players.length>0){
          const totalJournal=old.players.reduce((a,p)=>a+(p.journal||[]).length,0);
          const totalChecked=old.players.reduce((a,p)=>a+Object.values(p.checked||{}).filter(Boolean).length,0);
          if(totalJournal>0||totalChecked>0){
            setMigrationPreview({journal:totalJournal,skills:totalChecked,players:old.players.length});
            setMigrationState("available");
          }
        }
      }catch(e){}
    } else {
      // Fresh load — check if v5 exists, offer to import on onboarding complete
      setAppState("onboarding");
      try{
        const old=JSON.parse(localStorage.getItem("jtt-v5")||"null");
        if(old&&Array.isArray(old.players)&&old.players.length>0){
          const totalJournal=old.players.reduce((a,p)=>a+(p.journal||[]).length,0);
          const totalChecked=old.players.reduce((a,p)=>a+Object.values(p.checked||{}).filter(Boolean).length,0);
          if(totalJournal>0||totalChecked>0){
            setMigrationPreview({journal:totalJournal,skills:totalChecked,players:old.players.length});
            setMigrationState("available");
          }
        }
      }catch(e){}
    }
  },[]);

  function runMigration(){
    try{
      const old=JSON.parse(localStorage.getItem("jtt-v5")||"null");
      if(!old||!Array.isArray(old.players))return;
      const migrated=old.players.map(p=>({
        ...p,
        id:p.id||Date.now(),
        profile:p.profile||{},
        checked:p.checked||{},
        masteredDates:p.masteredDates||{},
        journal:p.journal||[],
        earnedAchievements:p.earnedAchievements||[],
      }));
      setPlayers(migrated);
      setActivePlayer(old.activePlayer||0);
      setActiveStage(migrated[0]?.profile?.currentStage||"red1");
      setAppState("app");
      setMigrationState("done");
      setTimeout(()=>setMigrationState(null),4000);
    }catch(e){alert("Migration failed: "+e.message);}
  }

  useEffect(()=>{
    if(appState!=="app"||players.length===0)return;
    saveData({players,activePlayer});
  },[players,activePlayer,appState]);

  const player=players[activePlayer]||{checked:{},masteredDates:{},journal:[],earnedAchievements:[],profile:{}};

  function updatePlayer(fn){setPlayers(prev=>prev.map((p,i)=>i===activePlayer?fn(p):p));}

  function checkAchievements(np){
    const earned=np.earnedAchievements||[];const toUnlock=[];
    const total=Object.values(np.checked).filter(Boolean).length;
    const pct=sid=>{const s=STAGES.find(s=>s.id===sid);const d=s.skills.filter(sk=>np.checked[sk.id]).length;return Math.round((d/s.skills.length)*100);};
    [{id:"first_skill",cond:total>=1},{id:"red1_half",cond:pct("red1")>=50},{id:"red1_done",cond:pct("red1")===100},{id:"red2_done",cond:pct("red2")===100},{id:"red3_done",cond:pct("red3")===100},{id:"orange_half",cond:pct("orange")>=50},{id:"orange_done",cond:pct("orange")===100},{id:"orange2_done",cond:pct("orange2")===100},{id:"orange3_done",cond:pct("orange3")===100},{id:"green_half",cond:pct("green")>=50},{id:"green_done",cond:pct("green")===100},{id:"journal_5",cond:(np.journal||[]).length>=5},{id:"journal_10",cond:(np.journal||[]).length>=10}]
    .forEach(c=>{if(c.cond&&!earned.includes(c.id))toUnlock.push(c.id);});
    if(toUnlock.length>0){const a=ACHIEVEMENTS.find(a=>a.id===toUnlock[0]);if(a){setToastAchievement(a);if(toUnlock[0].includes("done"))setConfettiActive(true);}return{...np,earnedAchievements:[...earned,...toUnlock]};}
    return np;
  }

  function toggleSkill(skillId){
    updatePlayer(p=>{
      const nowChecked=!p.checked[skillId];const md={...p.masteredDates};
      if(nowChecked){md[skillId]=todayStr();setRecentStarSkill(skillId);setTimeout(()=>setRecentStarSkill(null),700);}
      else delete md[skillId];
      return checkAchievements({...p,checked:{...p.checked,[skillId]:nowChecked},masteredDates:md});
    });
  }

  function addJournal(){
    if(!journalInput.trim())return;
    const entry={id:Date.now(),date:todayStr(),text:journalInput.trim(),mood:journalMood,stage:activeStage};
    updatePlayer(p=>checkAchievements({...p,journal:[entry,...(p.journal||[])]}));
    setJournalInput("");
  }

  function getStageProgress(stageId){
    const s=STAGES.find(s=>s.id===stageId);const done=s.skills.filter(sk=>player.checked[sk.id]).length;
    return{pct:Math.round((done/s.skills.length)*100),done,total:s.skills.length};
  }

  function getCurrentBall(){
    for(const s of [...STAGES].reverse()){if(getStageProgress(s.id).pct>=75)return s;}
    return STAGES.find(s=>s.id===player.profile?.currentStage)||STAGES[0];
  }

  function handleNavigate(tab,stageId){if(stageId)setActiveStage(stageId);setActiveTab(tab);}

  const currentBall=getCurrentBall();
  const totalSkills=STAGES.flatMap(s=>s.skills).length;
  const totalDone=STAGES.flatMap(s=>s.skills).filter(sk=>player.checked[sk.id]).length;
  const overallPct=Math.round((totalDone/totalSkills)*100);
  const stage=STAGES.find(s=>s.id===activeStage)||STAGES[0];
  const{pct:stagePct,done:stageDone,total:stageTotal}=getStageProgress(activeStage);
  const earned=player.earnedAchievements||[];

  const TABS=[{id:"home",label:"Home",icon:"🏠"},{id:"skills",label:"Skills",icon:"✓"},{id:"coach",label:"Coach Brief",icon:"📋"},{id:"drills",label:"Home Drills",icon:"🎯"},{id:"rescue",label:"Practice Rescue",icon:"🆘"},{id:"trophies",label:"Trophies",icon:"🏆"},{id:"learn",label:"Learn",icon:"📚"},{id:"journal",label:"Journal",icon:"📓"},{id:"programs",label:"Programs",icon:"📍"},{id:"parenting",label:"Parenting",icon:"💛"}];

  if(appState==="loading")return(<div style={{minHeight:"100vh",background:"#0a1628",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}><div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:10}}>🎾</div><div>Loading…</div></div></div>);
  if(appState==="onboarding")return(
    <div>
      {migrationState==="available"&&migrationPreview&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,background:"linear-gradient(135deg,#1a3a2a,#0d2218)",borderBottom:"2px solid #2D9C4A",padding:"14px 16px"}}>
          <div style={{maxWidth:480,margin:"0 auto"}}>
            <div style={{fontSize:13,fontWeight:"bold",color:"#4ade80",marginBottom:5}}>📦 Previous data found!</div>
            <div style={{fontSize:11,color:"#8ac8a0",marginBottom:10,lineHeight:1.6}}>
              Your old app has <strong style={{color:"#fff"}}>{migrationPreview.journal} journal {migrationPreview.journal===1?"entry":"entries"}</strong> and <strong style={{color:"#fff"}}>{migrationPreview.skills} checked skills</strong>. Import everything into this version?
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={runMigration} style={{flex:1,padding:"10px",borderRadius:11,background:"#2D9C4A",color:"#fff",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>✅ Import Everything</button>
              <button onClick={()=>setMigrationState("none")} style={{padding:"10px 14px",borderRadius:11,background:"rgba(255,255,255,0.07)",color:"#888",border:"1px solid rgba(255,255,255,0.1)",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>Skip</button>
            </div>
          </div>
        </div>
      )}
      <div style={{marginTop:migrationState==="available"?140:0}}>
        <Onboarding onComplete={profile=>{const np={id:Date.now(),profile,checked:{},masteredDates:{},journal:[],earnedAchievements:[]};setPlayers([np]);setActivePlayer(0);setActiveStage(profile.currentStage||"red1");setAppState("app");}}/>
      </div>
    </div>
  );
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a1628 0%,#0d2218 40%,#0a1628 100%)"}}>
      <Confetti active={confettiActive} onDone={()=>setConfettiActive(false)}/>
      {toastAchievement&&<Toast achievement={toastAchievement} onDone={()=>setToastAchievement(null)}/>}
      {showProfileEdit&&<ProfileEditModal player={player} onClose={()=>setShowProfileEdit(false)} onSave={profile=>{updatePlayer(p=>({...p,profile:{...p.profile,...profile}}));setShowProfileEdit(false);}}/>}

      {/* Migration banner */}
      {migrationState==="available"&&migrationPreview&&(
        <div style={{background:"linear-gradient(135deg,#1a3a2a,#0d2218)",borderBottom:"2px solid #2D9C4A",padding:"12px 16px"}}>
          <div style={{maxWidth:800,margin:"0 auto",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:200}}>
              <div style={{fontSize:12,fontWeight:"bold",color:"#4ade80",marginBottom:2}}>📦 Previous app data detected</div>
              <div style={{fontSize:11,color:"#8ac8a0"}}>
                Found <strong style={{color:"#fff"}}>{migrationPreview.journal} journal {migrationPreview.journal===1?"entry":"entries"}</strong> + <strong style={{color:"#fff"}}>{migrationPreview.skills} checked skills</strong> from your old version
              </div>
            </div>
            <div style={{display:"flex",gap:7,flexShrink:0}}>
              <button onClick={runMigration} style={{padding:"8px 14px",borderRadius:10,background:"#2D9C4A",color:"#fff",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>✅ Import Now</button>
              <button onClick={()=>setMigrationState("none")} style={{padding:"8px 10px",borderRadius:10,background:"rgba(255,255,255,0.07)",color:"#888",border:"1px solid rgba(255,255,255,0.1)",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>✕</button>
            </div>
          </div>
        </div>
      )}
      {migrationState==="done"&&(
        <div style={{background:"linear-gradient(135deg,#1a3a2a,#0d2218)",borderBottom:"2px solid #2D9C4A",padding:"10px 16px",textAlign:"center"}}>
          <span style={{fontSize:13,color:"#4ade80",fontWeight:600}}>✅ Migration complete! All journal entries and skills imported.</span>
        </div>
      )}

      {/* Header */}
      <div style={{background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"11px 14px"}}>
        <div style={{maxWidth:800,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer"}} onClick={()=>setActiveTab("home")}>
            <span style={{fontSize:24}}>🎾</span>
            <div><div style={{fontSize:15,fontWeight:"bold"}}>Junior Tennis Tracker</div><div style={{fontSize:9,color:"#6a9a7a",letterSpacing:"1.2px",textTransform:"uppercase"}}>Red · Orange · Green</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            {players.map((p,i)=>(
              <button key={p.id} onClick={()=>setActivePlayer(i)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 11px",borderRadius:18,border:"none",cursor:"pointer",background:i===activePlayer?"#2D9C4A":"rgba(255,255,255,0.08)",color:i===activePlayer?"#fff":"#aaa",fontFamily:"inherit",fontSize:11,fontWeight:i===activePlayer?700:400}}>
                <span style={{fontSize:13}}>{p.profile?.avatar||"🎾"}</span>{p.profile?.name||"Player"}
              </button>
            ))}
            <button onClick={()=>setShowProfileEdit(true)} style={{padding:"5px 9px",borderRadius:18,background:"rgba(255,255,255,0.06)",color:"#8a9a8a",border:"1px solid rgba(255,255,255,0.1)",cursor:"pointer",fontSize:10}}>✏️ Profile</button>
          </div>
        </div>
      </div>

      {/* Nav */}
      <div style={{background:"rgba(0,0,0,0.2)",borderBottom:"1px solid rgba(255,255,255,0.06)",overflowX:"auto"}}>
        <div style={{maxWidth:800,margin:"0 auto",display:"flex",padding:"0 8px"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{flexShrink:0,padding:"10px 11px",border:"none",borderBottom:`2px solid ${activeTab===t.id?"#2D9C4A":"transparent"}`,cursor:"pointer",background:"transparent",color:activeTab===t.id?"#fff":"#666",fontFamily:"inherit",fontSize:11,fontWeight:activeTab===t.id?600:400,transition:"all 0.2s",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
              {t.icon} {t.label}
              {t.id==="trophies"&&earned.length>0&&<span style={{fontSize:9,background:"rgba(245,158,11,0.3)",color:"#F59E0B",borderRadius:5,padding:"1px 3px"}}>{earned.length}</span>}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:800,margin:"0 auto",padding:"14px 12px 60px"}}>

        {activeTab==="home"&&<Dashboard player={player} onNavigate={handleNavigate} getStageProgress={getStageProgress} getCurrentBall={getCurrentBall}/>}

        {activeTab==="skills"&&(
          <div>
            <div style={{display:"flex",gap:5,marginBottom:12}}>
              {STAGES.map(s=>{const{pct}=getStageProgress(s.id);const isActive=s.id===activeStage;return(
                <button key={s.id} onClick={()=>setActiveStage(s.id)} style={{flex:1,padding:"7px 3px",borderRadius:9,border:"none",cursor:"pointer",background:isActive?`linear-gradient(135deg,${s.color},${s.accent})`:"rgba(255,255,255,0.05)",color:isActive?"#fff":"#888",fontFamily:"inherit",fontSize:10,fontWeight:isActive?700:400,boxShadow:isActive?`0 2px 10px ${s.color}44`:"none",transition:"all 0.25s"}}>
                  <div style={{fontSize:15,marginBottom:1}}>{s.emoji}</div><div>{s.short}</div><div style={{fontSize:8,opacity:0.85,marginTop:1}}>{pct}%</div>
                </button>
              );})}
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${stage.color}33`,borderRadius:13}}>
              <div style={{background:`linear-gradient(135deg,${stage.color}18,transparent)`,borderBottom:`1px solid ${stage.color}22`,padding:"11px 14px",display:"flex",alignItems:"center",gap:11}}>
                <div style={{position:"relative",width:44,height:44}}>
                  <ProgressRing pct={stagePct} color={stage.color} size={44}/>
                  <span style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:15}}>{stage.emoji}</span>
                </div>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:"bold"}}>{stage.label} · {stage.courtSize}</div><div style={{fontSize:10,color:"#8a9a8a"}}>{stage.ageRange}</div><div style={{fontSize:10,color:"#7a9a8a",marginTop:2,lineHeight:1.4}}>{stage.description}</div><a href="https://tenniscentersandpoint.com/classes-programs/juniors/" target="_blank" style={{display:"inline-block",marginTop:4,fontSize:9,color:"#2D9C4A",background:"rgba(45,156,74,0.12)",border:"1px solid rgba(45,156,74,0.25)",borderRadius:6,padding:"2px 7px",textDecoration:"none"}}>📍 Criteria: Tennis Center Sand Point ↗</a></div>
                <div style={{background:stage.color,color:"#fff",borderRadius:11,padding:"2px 9px",fontSize:11,fontWeight:700}}>{stageDone}/{stageTotal}</div>
              </div>
              <div style={{padding:"10px 12px",display:"grid",gap:5}}>
                {stage.skills.map(sk=>{
                  const done=!!player.checked[sk.id];const dt=player.masteredDates?.[sk.id];const justDone=recentStarSkill===sk.id;
                  return(
                    <div key={sk.id} onClick={()=>toggleSkill(sk.id)} style={{position:"relative",display:"flex",alignItems:"center",gap:9,padding:"9px 11px",borderRadius:8,cursor:"pointer",background:done?`${stage.color}14`:"rgba(255,255,255,0.025)",border:`1px solid ${done?stage.color+"44":"rgba(255,255,255,0.06)"}`,transition:"all 0.2s",animation:justDone?"pulse 0.4s ease":"none"}}>
                      <div style={{width:19,height:19,borderRadius:"50%",flexShrink:0,background:done?stage.color:"transparent",border:`2px solid ${done?stage.color:"rgba(255,255,255,0.2)"}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:9,fontWeight:"bold",transition:"all 0.25s"}}>{done?"✓":""}</div>
                      <span style={{flex:1,fontSize:12,color:done?"#e0ead0":"#b0b8a8"}}>{sk.text}</span>
                      {done&&dt&&<span style={{fontSize:8,color:stage.color,whiteSpace:"nowrap",fontStyle:"italic"}}>{dt}</span>}
                      {justDone&&<span style={{position:"absolute",top:-7,right:-7,fontSize:15,animation:"starPop 0.6s ease forwards",pointerEvents:"none"}}>⭐</span>}
                    </div>
                  );
                })}
              </div>
              {stagePct>=75&&STAGES.findIndex(s=>s.id===activeStage)<STAGES.length-1&&(
                <div style={{margin:"0 12px 12px",padding:"9px 13px",borderRadius:9,background:`${STAGES[STAGES.findIndex(s=>s.id===activeStage)+1].color}18`,border:`1px solid ${STAGES[STAGES.findIndex(s=>s.id===activeStage)+1].color}44`,textAlign:"center"}}>
                  <span style={{fontSize:12}}>🎉 Ready for </span>
                  <span onClick={()=>setActiveStage(STAGES[STAGES.findIndex(s=>s.id===activeStage)+1].id)} style={{color:STAGES[STAGES.findIndex(s=>s.id===activeStage)+1].color,cursor:"pointer",textDecoration:"underline",fontSize:12,fontWeight:700}}>{STAGES[STAGES.findIndex(s=>s.id===activeStage)+1].label} →</span>
                </div>
              )}
            </div>
          </div>
        )}

        {activeTab==="coach"&&<CoachBriefing player={player} getStageProgress={getStageProgress} getCurrentBall={getCurrentBall}/>}
        {activeTab==="drills"&&<HomeDrills player={player} getStageProgress={getStageProgress}/>}
        {activeTab==="rescue"&&<PracticeRescue/>}

        {activeTab==="trophies"&&<TrophyRoom earned={earned}/>}

        {activeTab==="learn"&&(
          <div>
            <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
              {LEARN_MODULES.map(m=><button key={m.id} onClick={()=>setActiveLearnModule(m.id)} style={{flexShrink:0,padding:"8px 12px",borderRadius:9,border:"none",cursor:"pointer",background:activeLearnModule===m.id?m.color:"rgba(255,255,255,0.06)",color:activeLearnModule===m.id?"#fff":"#aaa",fontFamily:"inherit",fontSize:11,fontWeight:activeLearnModule===m.id?700:400,display:"flex",alignItems:"center",gap:5}}><span>{m.icon}</span><span>{m.label}</span></button>)}
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"16px 14px"}}>
              {activeLearnModule==="grips"&&<GripModule/>}
              {activeLearnModule==="shots"&&<ShotsModule/>}
              {activeLearnModule==="court"&&<CourtModule/>}
              {activeLearnModule==="legends"&&<LegendsModule/>}
              {activeLearnModule==="rules"&&<RulesModule/>}
            </div>
          </div>
        )}

        {activeTab==="journal"&&(
          <div>
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:13,padding:"14px",marginBottom:11}}>
              <div style={{fontSize:10,color:"#8a9a8a",marginBottom:7,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>📓 New Session Note</div>
              <div style={{display:"flex",gap:6,marginBottom:7}}>
                {["🌟","💪","😅","🤩","📈","🎯"].map(m=><button key={m} onClick={()=>setJournalMood(m)} style={{fontSize:17,background:journalMood===m?"rgba(255,255,255,0.15)":"transparent",border:journalMood===m?"1px solid rgba(255,255,255,0.3)":"1px solid transparent",borderRadius:7,padding:"3px 6px",cursor:"pointer"}}>{m}</button>)}
              </div>
              <textarea value={journalInput} onChange={e=>setJournalInput(e.target.value)} placeholder={`How did ${player.profile?.name||"your child"}'s session go?`} rows={3}
                style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,color:"#f0ede6",fontFamily:"inherit",fontSize:12,padding:"7px 9px",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                <span style={{fontSize:9,color:"#6a7a6a"}}>{todayStr()} · {stage.label}</span>
                <button onClick={addJournal} style={{padding:"5px 13px",borderRadius:16,background:"#2D9C4A",color:"#fff",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600}}>Save Entry</button>
              </div>
            </div>
            {(player.journal||[]).length===0
              ?<div style={{textAlign:"center",color:"#5a6a5a",padding:"28px 20px",fontSize:12}}>No entries yet!</div>
              :<div style={{display:"grid",gap:7}}>
                {(player.journal||[]).map(entry=>{const es=STAGES.find(s=>s.id===entry.stage)||STAGES[0];return(
                  <div key={entry.id} style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${es.color}33`,borderLeft:`3px solid ${es.color}`,borderRadius:9,padding:"9px 12px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>{entry.mood}</span><span style={{fontSize:9,color:"#6a7a6a"}}>{entry.date}</span><span style={{fontSize:8,color:es.color,background:`${es.color}22`,padding:"2px 6px",borderRadius:8}}>{es.emoji} {es.short}</span></div>
                      <button onClick={()=>updatePlayer(p=>({...p,journal:(p.journal||[]).filter(e=>e.id!==entry.id)}))} style={{background:"none",border:"none",cursor:"pointer",color:"#4a5a4a",fontSize:13,padding:2}}>×</button>
                    </div>
                    <div style={{fontSize:12,color:"#c8d0c0",lineHeight:1.55}}>{entry.text}</div>
                  </div>
                );})}
              </div>
            }
          </div>
        )}

        {activeTab==="programs"&&(
          <div style={{display:"grid",gap:9}}>
            <div style={{fontSize:10,color:"#6a7a6a",textAlign:"center",marginBottom:2}}>Seattle-area junior tennis programs</div>
            {PROGRAMS.map(prog=>(
              <div key={prog.name} style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${prog.color}33`,borderLeft:`3px solid ${prog.color}`,borderRadius:11,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:6}}>
                  <div style={{flex:1,minWidth:155}}>
                    <div style={{fontSize:13,fontWeight:"bold",marginBottom:2}}>{prog.name}</div>
                    <div style={{fontSize:9,color:prog.color,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{prog.type}</div>
                    <div style={{fontSize:10,color:"#8a9a8a",marginBottom:2}}>📍 {prog.address}</div>
                    <div style={{fontSize:10,color:"#8a9a8a",marginBottom:3}}>📞 {prog.phone}</div>
                    <div style={{fontSize:10,color:"#b0c0b0",lineHeight:1.5}}>{prog.notes}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                    <div style={{fontSize:9,color:"#7a8a7a",background:"rgba(255,255,255,0.06)",padding:"2px 7px",borderRadius:8}}>{prog.levels}</div>
                    <a href={prog.url} target="_blank" rel="noopener noreferrer" style={{padding:"4px 11px",borderRadius:15,background:prog.color,color:"#fff",textDecoration:"none",fontSize:10,fontWeight:600,fontFamily:"inherit"}}>Visit →</a>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {activeTab==="parenting"&&(
          <div style={{display:"grid",gap:9}}>
            {PARENTING_TIPS.map((tip,i)=><ParentingTip key={i} tip={tip}/>)}
            <div style={{fontSize:9,color:"#4a5a4a",textAlign:"center",padding:"5px 0"}}>Inspired by USTA parent development resources and junior coaching best practices.</div>
          </div>
        )}

      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
